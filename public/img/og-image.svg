<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030712"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Route lines (world map suggestion) -->
  <g opacity="0.08" stroke="#3b82f6" stroke-width="1" fill="none">
    <!-- Horizontal grid lines -->
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="314" x2="1200" y2="314"/>
    <line x1="0" y1="471" x2="1200" y2="471"/>
    <!-- Vertical grid lines -->
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Route curves -->
  <g opacity="0.15" stroke="#3b82f6" stroke-width="1.5" fill="none">
    <path d="M 120 420 Q 400 200 680 320 Q 900 400 1100 280"/>
    <path d="M 80 350 Q 300 150 600 250 Q 850 330 1100 200"/>
    <path d="M 150 480 Q 450 280 750 350 Q 950 400 1150 300"/>
  </g>

  <!-- Animated route dots suggestion -->
  <circle cx="680" cy="320" r="3" fill="#3b82f6" opacity="0.4"/>
  <circle cx="400" cy="200" r="3" fill="#3b82f6" opacity="0.4"/>
  <circle cx="900" cy="280" r="3" fill="#3b82f6" opacity="0.4"/>

  <!-- Blue glow blob top right -->
  <circle cx="1050" cy="120" r="200" fill="#1d4ed8" opacity="0.06" filter="url(#softglow)"/>
  <!-- Blue glow blob bottom left -->
  <circle cx="150" cy="520" r="150" fill="#0891b2" opacity="0.05" filter="url(#softglow)"/>

  <!-- Left accent line -->
  <rect x="72" y="180" width="3" height="270" fill="url(#accent)" rx="2"/>

  <!-- Logo mark -->
  <rect x="72" y="82" width="56" height="56" rx="12" fill="url(#accent)"/>
  <text x="100" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="900" fill="white" text-anchor="middle">M</text>

  <!-- Company name -->
  <text x="146" y="104" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="900" fill="white" letter-spacing="2" text-anchor="start">MULTICARGO</text>
  <text x="146" y="124" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#64748b" letter-spacing="3" text-anchor="start">LOGISTICS GROUP</text>

  <!-- Main headline -->
  <text x="72" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" fill="white" letter-spacing="-2">Multi Routes.</text>
  <text x="72" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" fill="url(#accent)" letter-spacing="-2">One Partner.</text>

  <!-- Subheadline -->
  <text x="72" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#94a3b8" letter-spacing="0">We Run Your Imports. You Run Your Business.</text>

  <!-- Divider -->
  <rect x="72" y="428" width="600" height="1" fill="#1e293b"/>

  <!-- Stats row -->
  <text x="72" y="468" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="900" fill="white">15+</text>
  <text x="72" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569" letter-spacing="2">YEARS</text>

  <text x="180" y="468" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="900" fill="white">6</text>
  <text x="180" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569" letter-spacing="2">OFFICES</text>

  <text x="270" y="468" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="900" fill="white">30+</text>
  <text x="270" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569" letter-spacing="2">COUNTRIES</text>

  <text x="380" y="468" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="900" fill="white">500+</text>
  <text x="380" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#475569" letter-spacing="2">CLIENTS</text>

  <!-- Domain -->
  <text x="72" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#3b82f6" letter-spacing="1">multicargoltd.com</text>

  <!-- Right side — office dots -->
  <g>
    <!-- Shenzhen -->
    <circle cx="980" cy="360" r="5" fill="#3b82f6" filter="url(#glow)" opacity="0.9"/>
    <text x="992" y="364" font-family="system-ui" font-size="11" fill="#64748b">Shenzhen</text>

    <!-- Warsaw -->
    <circle cx="820" cy="220" r="5" fill="#3b82f6" filter="url(#glow)" opacity="0.9"/>
    <text x="832" y="224" font-family="system-ui" font-size="11" fill="#64748b">Warsaw</text>

    <!-- Kyiv -->
    <circle cx="900" cy="240" r="6" fill="#60a5fa" filter="url(#glow)" opacity="1"/>
    <text x="914" y="244" font-family="system-ui" font-size="11" fill="#94a3b8" font-weight="600">Kyiv</text>

    <!-- Valencia -->
    <circle cx="780" cy="300" r="5" fill="#3b82f6" filter="url(#glow)" opacity="0.9"/>
    <text x="792" y="304" font-family="system-ui" font-size="11" fill="#64748b">Valencia</text>

    <!-- Tallinn -->
    <circle cx="860" cy="190" r="4" fill="#3b82f6" opacity="0.7"/>
    <text x="872" y="194" font-family="system-ui" font-size="11" fill="#64748b">Tallinn</text>

    <!-- Gdańsk -->
    <circle cx="835" cy="205" r="4" fill="#3b82f6" opacity="0.7"/>

    <!-- Route lines between offices -->
    <line x1="980" y1="360" x2="900" y2="240" stroke="#3b82f6" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>
    <line x1="900" y1="240" x2="820" y2="220" stroke="#3b82f6" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>
    <line x1="820" y1="220" x2="780" y2="300" stroke="#3b82f6" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>
    <line x1="860" y1="190" x2="900" y2="240" stroke="#3b82f6" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)" opacity="0.6"/>
</svg>
